# ============================================================================
# Pre-commit hooks — run automatically before each `git commit`.
#
# Setup:    uv run pre-commit install      (one-time, from apps/api/)
# Manual:   uv run pre-commit run --all-files
#
# If a hook fails, the commit is aborted. Fix the issues (most are auto-fixed
# by the hook itself), then `git add` again and re-commit.
# ============================================================================

# Default to running on all files when triggered manually.
default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]

repos:
  # --------------------------------------------------------------------------
  # General hygiene — fixes that apply to any text file
  # --------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$    # markdown uses trailing whitespace for line breaks
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # --------------------------------------------------------------------------
  # Ruff — lint + format Python (runs against apps/api/src and apps/api/tests)
  # --------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        name: ruff lint
        args: [--fix, --exit-non-zero-on-fix]
        files: ^apps/api/
      - id: ruff-format
        name: ruff format
        files: ^apps/api/

  # --------------------------------------------------------------------------
  # mypy — strict type checking
  # Runs against the installed package, so it sees our project + deps
  # --------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        name: mypy strict
        files: ^apps/api/src/
        args: [--config-file=apps/api/pyproject.toml]
        additional_dependencies:
          - pydantic>=2.9.0
          - pydantic-settings>=2.6.0
          - structlog>=24.4.0
          - fastapi>=0.115.0
          - httpx>=0.27.0

  # --------------------------------------------------------------------------
  # gitleaks — detect committed secrets (API keys, tokens, etc.)
  # Critical safety net — even .gitignore can miss things.
  # --------------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # --------------------------------------------------------------------------
  # Conventional commits — enforces commit message style
  # Format: <type>(<scope>): <description>
  # Types: feat, fix, docs, style, refactor, test, chore, perf, ci, build
  # --------------------------------------------------------------------------
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, test, chore, perf, ci, build]
